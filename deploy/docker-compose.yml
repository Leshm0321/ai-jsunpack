services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    env_file:
      - ./env/db.env.example
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  artifact-store:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: ["server", "/data", "--console-address", ":9001"]
    env_file:
      - ./env/artifact-store.env.example
    volumes:
      - artifact-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20

  artifact-store-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:latest}
    env_file:
      - ./env/artifact-store.env.example
      - ./env/api.env.example
    depends_on:
      artifact-store:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://artifact-store:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${AI_JSUNPACK_ARTIFACT_S3_BUCKET}"

  api:
    image: ${AI_JSUNPACK_API_IMAGE:-ai-jsunpack/api:local}
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    env_file:
      - ./env/api.env.example
    depends_on:
      db:
        condition: service_healthy
      artifact-store:
        condition: service_healthy
      artifact-store-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  browser-runner:
    image: ${AI_JSUNPACK_BROWSER_RUNNER_IMAGE:-ai-jsunpack/browser-runner:local}
    build:
      context: ..
      dockerfile: deploy/docker/browser-runner.Dockerfile
    env_file:
      - ./env/browser-runner.env.example
    depends_on:
      db:
        condition: service_healthy
      artifact-store:
        condition: service_healthy
      artifact-store-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    image: ${AI_JSUNPACK_WORKER_IMAGE:-ai-jsunpack/worker:local}
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    env_file:
      - ./env/worker.env.example
    environment:
      AI_JSUNPACK_SANDBOX_VOLUME_NAME: ${AI_JSUNPACK_SANDBOX_VOLUME_NAME:-ai-jsunpack-sandbox-workspaces}
      AI_JSUNPACK_SANDBOX_WORKSPACE_ROOT: /var/lib/ai-jsunpack/sandbox-workspaces
    depends_on:
      db:
        condition: service_healthy
      artifact-store:
        condition: service_healthy
      artifact-store-init:
        condition: service_completed_successfully
      browser-runner:
        condition: service_healthy
    volumes:
      - sandbox-workspaces:/var/lib/ai-jsunpack/sandbox-workspaces
      - crewai-data:/var/lib/ai-jsunpack/crewai
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock

  web:
    image: ${AI_JSUNPACK_WEB_IMAGE:-ai-jsunpack/web:local}
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    env_file:
      - ./env/web.env.example
    environment:
      AI_JSUNPACK_WEB_API_BASE_URL: /api
      AI_JSUNPACK_WEB_API_UPSTREAM: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  db-data:
  artifact-data:
  crewai-data:
  runtime-secrets:
  sandbox-workspaces:
    name: ${AI_JSUNPACK_SANDBOX_VOLUME_NAME:-ai-jsunpack-sandbox-workspaces}
