services:
  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_jsunpack}
      POSTGRES_USER: ${POSTGRES_USER:-ai_jsunpack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    restart: unless-stopped

  artifact-store:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    restart: unless-stopped

  artifact-store-init:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      AI_JSUNPACK_ARTIFACT_S3_BUCKET: ${AI_JSUNPACK_ARTIFACT_S3_BUCKET:-ai-jsunpack-artifacts}

  api:
    environment:
      AI_JSUNPACK_AUTH_SECRET: ${AI_JSUNPACK_AUTH_SECRET:?AI_JSUNPACK_AUTH_SECRET is required}
      AI_JSUNPACK_CORS_ORIGINS: ${AI_JSUNPACK_CORS_ORIGINS:-}
      AI_JSUNPACK_DATABASE_URL: ${AI_JSUNPACK_DATABASE_URL:?AI_JSUNPACK_DATABASE_URL is required}
      AI_JSUNPACK_ARTIFACT_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      AI_JSUNPACK_ARTIFACT_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      AI_JSUNPACK_DEPLOYMENT_PROFILE: production
    restart: unless-stopped

  browser-runner:
    environment:
      AI_JSUNPACK_AUTH_SECRET: ${AI_JSUNPACK_AUTH_SECRET:?AI_JSUNPACK_AUTH_SECRET is required}
      AI_JSUNPACK_BROWSER_RUNNER_QUEUE_DATABASE_URL: ${AI_JSUNPACK_DATABASE_URL:?AI_JSUNPACK_DATABASE_URL is required}
      AI_JSUNPACK_ARTIFACT_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      AI_JSUNPACK_ARTIFACT_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      AI_JSUNPACK_DEPLOYMENT_PROFILE: production
    restart: unless-stopped

  worker:
    environment:
      AI_JSUNPACK_AUTH_SECRET: ${AI_JSUNPACK_AUTH_SECRET:?AI_JSUNPACK_AUTH_SECRET is required}
      AI_JSUNPACK_DATABASE_URL: ${AI_JSUNPACK_DATABASE_URL:?AI_JSUNPACK_DATABASE_URL is required}
      AI_JSUNPACK_ARTIFACT_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      AI_JSUNPACK_ARTIFACT_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      AI_JSUNPACK_BROWSER_RUNNER_TOKEN: ${AI_JSUNPACK_BROWSER_RUNNER_TOKEN:?AI_JSUNPACK_BROWSER_RUNNER_TOKEN is required}
      AI_JSUNPACK_DEPLOYMENT_PROFILE: production
      AI_JSUNPACK_AGENT_PROVIDER: ${AI_JSUNPACK_AGENT_PROVIDER:-}
      AI_JSUNPACK_AGENT_MODEL: ${AI_JSUNPACK_AGENT_MODEL:-}
      AI_JSUNPACK_AGENT_BASE_URL: ${AI_JSUNPACK_AGENT_BASE_URL:-}
      AI_JSUNPACK_AGENT_API_KEY: ${AI_JSUNPACK_AGENT_API_KEY:-}
      AI_JSUNPACK_LOCAL_AGENT_PROVIDER: ${AI_JSUNPACK_LOCAL_AGENT_PROVIDER:-}
      AI_JSUNPACK_LOCAL_AGENT_MODEL: ${AI_JSUNPACK_LOCAL_AGENT_MODEL:-}
      AI_JSUNPACK_LOCAL_AGENT_BASE_URL: ${AI_JSUNPACK_LOCAL_AGENT_BASE_URL:-}
      AI_JSUNPACK_LOCAL_AGENT_API_KEY: ${AI_JSUNPACK_LOCAL_AGENT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-}
    restart: unless-stopped

  web:
    environment:
      AI_JSUNPACK_WEB_AUTH_TOKEN: ${AI_JSUNPACK_WEB_AUTH_TOKEN:?AI_JSUNPACK_WEB_AUTH_TOKEN is required}
      AI_JSUNPACK_WEB_AUTH_TOKEN_FILE: ""
      AI_JSUNPACK_WEB_USER_ID: ${AI_JSUNPACK_WEB_USER_ID:-docker-user}
      AI_JSUNPACK_WEB_PROJECT_ID: ${AI_JSUNPACK_WEB_PROJECT_ID:-default}
    ports:
      - "${AI_JSUNPACK_WEB_BIND_ADDRESS:-0.0.0.0}:${AI_JSUNPACK_WEB_PORT:-8080}:5173"
    restart: unless-stopped
