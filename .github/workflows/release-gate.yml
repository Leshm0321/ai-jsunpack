name: Release Gate

on:
  workflow_dispatch:
    inputs:
      version:
        description: 要发布的不可变镜像版本标签。
        required: true
        type: string
      previous_version:
        description: 用于回滚证据的上一已知良好镜像版本。
        required: false
        type: string
      repository_prefix:
        description: ghcr.io 下的注册表命名空间。
        required: false
        type: string
      secret_environment:
        description: 保存生产发布秘密的 GitHub Environment。
        required: false
        default: production
        type: string
      push_images:
        description: 本地发布门禁检查后将镜像推送到 GHCR。
        required: true
        default: false
        type: boolean
      sbom_tool:
        description: SBOM 工具命令；如已批准例外，选择 none。
        required: true
        default: syft
        type: choice
        options:
          - syft
          - none
      scan_tool:
        description: 漏洞扫描器命令；如已批准例外，选择 none。
        required: true
        default: trivy
        type: choice
        options:
          - trivy
          - none

permissions:
  contents: read
  packages: write

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: ${{ inputs.secret_environment }}
    env:
      RELEASE_GATE_DIR: tmp/release-gate
      REGISTRY: ghcr.io
      REPOSITORY_PREFIX: ${{ inputs.repository_prefix || github.repository }}
      VERSION: ${{ inputs.version }}
      PREVIOUS_VERSION: ${{ inputs.previous_version }}
      SECRET_ENVIRONMENT: ${{ inputs.secret_environment }}
      PUSH_IMAGES: ${{ inputs.push_images }}
      SBOM_TOOL: ${{ inputs.sbom_tool }}
      SCAN_TOOL: ${{ inputs.scan_tool }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装项目依赖
        shell: bash
        run: |
          npm ci
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: 安装发布工具
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          if [ "$SBOM_TOOL" = "syft" ]; then
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          fi
          if [ "$SCAN_TOOL" = "trivy" ]; then
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
            echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: 运行仓库验证
        shell: bash
        run: |
          npm run check
          npm run test:core
          npm run build:web
          .venv/bin/python -m compileall apps packages tests
          .venv/bin/python -m unittest discover -s tests

      - name: 登录 GHCR
        if: ${{ inputs.push_images }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: 运行发布门禁
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RELEASE_GATE_DIR"
          args=(
            -m deploy.release_gate
            --registry "$REGISTRY"
            --repository-prefix "$REPOSITORY_PREFIX"
            --version "$VERSION"
            --git-sha "${{ github.sha }}"
            --ci-platform github_actions
            --secret-environment "$SECRET_ENVIRONMENT"
            --sbom-tool "$SBOM_TOOL"
            --scan-tool "$SCAN_TOOL"
            --output "$RELEASE_GATE_DIR/release-gate.json"
            --sbom-output-dir "$RELEASE_GATE_DIR/sbom"
            --scan-output-dir "$RELEASE_GATE_DIR/scans"
            --compose-smoke-output "$RELEASE_GATE_DIR/compose-smoke.json"
            --compose-artifact-root "$RELEASE_GATE_DIR/artifacts"
            --deployment-smoke-output "$RELEASE_GATE_DIR/deployment-smoke.json"
            --execute
          )
          if [ -n "$PREVIOUS_VERSION" ]; then
            args+=(--previous-version "$PREVIOUS_VERSION")
          fi
          if [ "$PUSH_IMAGES" = "true" ]; then
            args+=(--push)
          fi
          .venv/bin/python "${args[@]}"

      - name: 上传发布门禁报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-report
          path: tmp/release-gate/release-gate.json
          if-no-files-found: warn

      - name: 上传 SBOM 证据
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-sbom
          path: tmp/release-gate/sbom
          if-no-files-found: warn

      - name: 上传漏洞扫描证据
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-scans
          path: tmp/release-gate/scans
          if-no-files-found: warn

      - name: 上传 Compose 冒烟证据
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-report
          path: tmp/release-gate/compose-smoke.json
          if-no-files-found: warn

      - name: 上传部署冒烟证据
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-smoke-report
          path: tmp/release-gate/deployment-smoke.json
          if-no-files-found: warn
